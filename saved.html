<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
function n(v){return Number(String(v||0).replace(/,/g,''))||0}

function sum(rows,names){
  let t=0;
  (rows||[]).forEach(r=>{
    if(names.includes(r.source)) t+=n(r.high)
  });
  return t?t.toLocaleString('zh-TW',{maximumFractionDigits:2}):'-'
}

function get(rows,name){
  const r=(rows||[]).find(x=>x.source===name);
  return r?r.high:'-'
}

function render(){
  const list = JSON.parse(localStorage.getItem('MS_SAVED_ROWS')||'[]');
  const tb = document.querySelector('#savedTable tbody');
  tb.innerHTML='';

  if(!list.length){
    tb.innerHTML='<tr><td colspan="14">目前沒有儲存內容</td></tr>';
    return;
  }

  const hunt=['狩獵','活動技能','暴風修練','一般加速器','快遞加速器','寶物獵人寶箱'];
  const daily=['每日三區','怪物公園','紅月之森','極限怪物公園','史詩副本'];
  const act=['鋼鐵草莓農場','黃金番茄拳擊機','桑拿'];
  const afk=['會場掛機','VIP掛機'];

  list.forEach(item=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${item.dateRange||'-'}</td>
      <td>${item.level||'-'}</td>
      <td>${item.levelPct||'-'}</td>
      <td>${item.final||'-'}</td>
      <td>${item.totalExp||'-'}</td>
      <td>${item.totalHigh||'-'}</td>
      <td>${sum(item.rows,hunt)}</td>
      <td>${sum(item.rows,daily)}</td>
      <td>${sum(item.rows,act)}</td>
      <td>${get(item.rows,'高階票')}</td>
      <td>${get(item.rows,'各種水')}</td>
      <td>${sum(item.rows,afk)}</td>
      <td>${item.note||''}</td>
    `;
    tb.appendChild(tr);
  });
}

function exportExcel(){
  const list = JSON.parse(localStorage.getItem('MS_SAVED_ROWS')||'[]');
  if(list.length===0){
    alert("沒有資料");
    return;
  }

  const ws = XLSX.utils.json_to_sheet(list);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "MS資料");
  XLSX.writeFile(wb, "MS資料.xlsx");
}

render();
</script>
