<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS 儲存內容</title>

<!-- Excel 套件 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --line:#243041;
}
body{
  margin:0;
  background:linear-gradient(180deg,#0b1220,#0f172a);
  color:var(--text);
  font-family:sans-serif;
}
.wrap{max-width:1400px;margin:auto;padding:20px}
.card{
  background:#111827;
  border:1px solid var(--line);
  border-radius:12px;
  padding:16px;
}
button{
  margin-right:8px;
  padding:6px 10px;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  border-bottom:1px solid #243041;
  padding:6px;
  font-size:13px;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>MS 儲存內容</h1>

  <div class="card">
    <button onclick="render()">重新整理</button>
    <button onclick="exportExcel()">匯出 Excel</button>
    <button onclick="clearAll()">清除全部</button>

    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>等級</th>
          <th>%</th>
          <th>結果</th>
          <th>總EXP</th>
          <th>高階EXP</th>
          <th>備註</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

<script>
// 數字轉換
function n(v){
  return Number(String(v||0).replace(/,/g,''))||0;
}

// 讀資料
function getList(){
  return JSON.parse(localStorage.getItem('MS_SAVED_ROWS')||'[]');
}

// 顯示
function render(){
  const list = getList();
  const tb = document.getElementById("tb");
  tb.innerHTML = "";

  if(list.length === 0){
    tb.innerHTML = "<tr><td colspan='8'>沒有資料</td></tr>";
    return;
  }

  list.forEach(item=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.dateRange || '-'}</td>
      <td>${item.level || '-'}</td>
      <td>${item.levelPct || '-'}</td>
      <td>${item.final || '-'}</td>
      <td>${item.totalExp || '-'}</td>
      <td>${item.totalHigh || '-'}</td>
      <td>${item.note || ''}</td>
      <td><button onclick="removeItem(${item.id})">刪除</button></td>
    `;

    tb.appendChild(tr);
  });
}

// 刪除
function removeItem(id){
  const list = getList().filter(x=>x.id!==id);
  localStorage.setItem('MS_SAVED_ROWS', JSON.stringify(list));
  render();
}

// 清空
function clearAll(){
  if(confirm("確定清除？")){
    localStorage.removeItem('MS_SAVED_ROWS');
    render();
  }
}

// 匯出 Excel
function exportExcel(){
  const list = getList();

  if(list.length === 0){
    alert("沒有資料");
    return;
  }

  const data = list.map(item=>({
    日期:item.dateRange,
    等級:item.level,
    百分比:item.levelPct,
    最終結果:item.final,
    總EXP:n(item.totalExp),
    高階EXP:n(item.totalHigh),
    備註:item.note
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "資料");

  XLSX.writeFile(wb, "MS紀錄.xlsx");
}

// 初始
render();
</script>

</body>
</html>
