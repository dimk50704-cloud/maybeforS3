<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MS 儲存內容</title><style>:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--line:#243041;--accent:#38bdf8}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0b1220,#0f172a);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans TC",sans-serif}.wrap{max-width:1680px;margin:0 auto;padding:24px}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.nav a{color:#bae6fd;text-decoration:none;background:#082f49;padding:8px 12px;border-radius:999px;border:1px solid #164e63}.card{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}table{width:100%;border-collapse:collapse}th,td{text-align:right;padding:8px 6px;border-bottom:1px solid #243041;font-size:13px}th:first-child,td:first-child{text-align:left}button{padding:8px 12px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:var(--text);cursor:pointer}</style></head><body><div class="wrap"><div class="nav"><a href="./index.html">主計算頁</a><a href="./saved.html">儲存內容</a></div><h1>MS 儲存內容</h1><div class="card"><button onclick="render()">重新整理</button><button onclick="exportExcel()">匯出 Excel</button> <button onclick="clearAll()">清除全部</button><table id="savedTable"><thead><tr><th>日期區間</th><th>目前等級</th><th>目前%</th><th>最終結果</th><th>總EXP</th><th>等值高階EXP</th><th>狩獵區</th><th>日常項目</th><th>活動</th><th>高階票</th><th>水</th><th>掛機</th><th>備註</th><th>操作</th></tr></thead><tbody></tbody></table></div></div><script>function n(v){return Number(String(v||0).replace(/,/g,''))||0}function sum(rows,names){let t=0;(rows||[]).forEach(r=>{if(names.includes(r.source))t+=n(r.high)});return t?t.toLocaleString('zh-TW',{maximumFractionDigits:2,minimumFractionDigits:2}):'-'}function get(rows,name){const r=(rows||[]).find(x=>x.source===name);return r?r.high:'-'} function exportExcel(){

    const list = JSON.parse(localStorage.getItem('MS_SAVED_ROWS') || '[]');

    if(list.length===0){
        alert("沒有可匯出的資料");
        return;
    }

    function value(rows,name){
        const r=(rows||[]).find(x=>x.source===name);
        return r ? Number(String(r.high).replace(/,/g,'')) : 0;
    }

    const excelData = list.map(item=>({

        日期區間:item.dateRange,

        目前等級:item.level,

        目前百分比:item.levelPct,

        最終結果:item.final,

        總EXP:Number(String(item.totalExp).replace(/,/g,'')),

        等值高階EXP:Number(String(item.totalHigh).replace(/,/g,'')),

        狩獵:value(item.rows,'狩獵'),

        活動技能:value(item.rows,'活動技能'),

        暴風修練:value(item.rows,'暴風修練'),

        一般加速器:value(item.rows,'一般加速器'),

        快遞加速器:value(item.rows,'快遞加速器'),

        寶物獵人寶箱:value(item.rows,'寶物獵人寶箱'),

        每日三區:value(item.rows,'每日三區'),

        怪物公園:value(item.rows,'怪物公園'),

        紅月之森:value(item.rows,'紅月之森'),

        極限怪物公園:value(item.rows,'極限怪物公園'),

        史詩副本:value(item.rows,'史詩副本'),

        鋼鐵草莓農場:value(item.rows,'鋼鐵草莓農場'),

        黃金番茄拳擊機:value(item.rows,'黃金番茄拳擊機'),

        桑拿:value(item.rows,'桑拿'),

        高階票:value(item.rows,'高階票'),

        各種水:value(item.rows,'各種水'),

        會場掛機:value(item.rows,'會場掛機'),

        VIP掛機:value(item.rows,'VIP掛機'),

        備註:item.note

    }));

    const ws = XLSX.utils.json_to_sheet(excelData);

    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb,ws,"MS資料");

    XLSX.writeFile(wb,"MS資料.xlsx");

} render(){const list=JSON.parse(localStorage.getItem('MS_SAVED_ROWS')||'[]');const tb=document.querySelector('#savedTable tbody');tb.innerHTML='';if(!list.length){tb.innerHTML='<tr><td colspan="14">目前沒有儲存內容</td></tr>';return}const hunt=['狩獵','活動技能','暴風修練','一般加速器','快遞加速器','寶物獵人寶箱'];const daily=['每日三區','怪物公園','紅月之森','極限怪物公園','史詩副本'];const act=['鋼鐵草莓農場','黃金番茄拳擊機','桑拿'];const afk=['會場掛機','VIP掛機'];list.forEach(item=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${item.dateRange||'-'}</td><td>${item.level||'-'}</td><td>${item.levelPct||'-'}</td><td>${item.final||'-'}</td><td>${item.totalExp||'-'}</td><td>${item.totalHigh||'-'}</td><td>${sum(item.rows,hunt)}</td><td>${sum(item.rows,daily)}</td><td>${sum(item.rows,act)}</td><td>${get(item.rows,'高階票')}</td><td>${get(item.rows,'各種水')}</td><td>${sum(item.rows,afk)}</td><td>${item.note||''}</td><td><button onclick="removeItem(${item.id})">刪除</button></td>`;tb.appendChild(tr)})}function removeItem(id){const list=JSON.parse(localStorage.getItem('MS_SAVED_ROWS')||'[]').filter(x=>x.id!==id);localStorage.setItem('MS_SAVED_ROWS',JSON.stringify(list));render()}function clearAll(){if(confirm('確定清除全部儲存內容？')){localStorage.removeItem('MS_SAVED_ROWS');render()}}render()<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script></script></body></html>
