<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS 儲存內容</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--line:#243041;--accent:#38bdf8}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0b1220,#0f172a);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans TC",sans-serif}
.wrap{max-width:1680px;margin:0 auto;padding:24px}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.nav a{color:#bae6fd;text-decoration:none;background:#082f49;padding:8px 12px;border-radius:999px;border:1px solid #164e63}
.card{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{text-align:right;padding:8px 6px;border-bottom:1px solid #243041;font-size:13px;white-space:nowrap}
th:first-child,td:first-child{text-align:left}
button{padding:8px 12px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:var(--text);cursor:pointer;margin-right:8px;margin-bottom:8px}
.muted{color:var(--muted);font-size:12px;line-height:1.5}
.debug{background:#0b1220;border:1px solid #243041;border-radius:10px;padding:10px;margin-top:10px;color:#cbd5e1;font-size:12px;white-space:pre-wrap}
@media(max-width:900px){.wrap{padding:12px}table{display:block;overflow-x:auto}}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav"><a href="./index.html">主計算頁</a><a href="./saved.html">儲存內容</a></div>
  <h1>MS 儲存內容</h1>
  <div class="card">
    <button onclick="render()">重新整理</button>
    <button onclick="exportExcel()">匯出 Excel</button>
    <button onclick="exportCsv()">匯出 CSV</button>
    <button onclick="clearAll()">清除全部</button>
    <div class="muted">此頁只讀取第一頁儲存在 <code>localStorage.MS_SAVED_ROWS</code> 的快照；不重新計算。</div>
    <div id="debugInfo" class="debug"></div>
    <table id="savedTable">
      <thead>
        <tr>
          <th>日期區間</th><th>目前等級</th><th>目前%</th><th>最終結果</th><th>總EXP</th><th>等值高階EXP</th>
          <th>狩獵區</th><th>日常項目</th><th>活動</th><th>高階票</th><th>水</th><th>掛機</th><th>備註</th><th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<script>
const GROUPS={
  hunt:['狩獵','活動技能','暴風修練','一般加速器','快遞加速器','寶物獵人寶箱'],
  daily:['每日三區','怪物公園','紅月之森','極限怪物公園','史詩副本'],
  activity:['鋼鐵草莓農場','黃金番茄拳擊機','桑拿'],
  afk:['會場掛機','VIP掛機']
};

function parseNum(v){
  return Number(String(v||0).replace(/,/g,''))||0;
}

function safeList(){
  try{
    const raw=localStorage.getItem('MS_SAVED_ROWS')||'[]';
    const list=JSON.parse(raw);
    return Array.isArray(list)?list:[];
  }catch(e){
    console.error('MS_SAVED_ROWS JSON 解析失敗',e);
    return [];
  }
}

function sumHigh(rows,names){
  let total=0;
  (rows||[]).forEach(r=>{
    if(names.includes(r.source)) total+=parseNum(r.high);
  });
  return total>0?total.toLocaleString('zh-TW',{maximumFractionDigits:2,minimumFractionDigits:2}):'-';
}

function getHigh(rows,name){
  const r=(rows||[]).find(x=>x.source===name);
  return r?r.high:'-';
}

function renderDebug(list){
  const rawLen=(localStorage.getItem('MS_SAVED_ROWS')||'').length;
  document.getElementById('debugInfo').textContent=
    '目前讀到筆數：'+list.length+'\n'+
    'localStorage key：MS_SAVED_ROWS\n'+
    '資料長度：'+rawLen+' 字元\n'+
    '目前網址 origin：'+location.origin;
}

function render(){
  const list=safeList();
  renderDebug(list);
  const tb=document.querySelector('#savedTable tbody');
  tb.innerHTML='';

  if(!list.length){
    tb.innerHTML='<tr><td colspan="14">目前沒有儲存內容。請先回主計算頁按「儲存內容」。</td></tr>';
    return;
  }

  list.forEach(item=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${item.dateRange||'-'}</td>
      <td>${item.level||'-'}</td>
      <td>${item.levelPct||'-'}</td>
      <td>${item.final||'-'}</td>
      <td>${item.totalExp||'-'}</td>
      <td>${item.totalHigh||'-'}</td>
      <td>${sumHigh(item.rows,GROUPS.hunt)}</td>
      <td>${sumHigh(item.rows,GROUPS.daily)}</td>
      <td>${sumHigh(item.rows,GROUPS.activity)}</td>
      <td>${getHigh(item.rows,'高階票')}</td>
      <td>${getHigh(item.rows,'各種水')}</td>
      <td>${sumHigh(item.rows,GROUPS.afk)}</td>
      <td>${item.note||''}</td>
      <td><button onclick="removeItem(${item.id})">刪除</button></td>
    `;
    tb.appendChild(tr);
  });
}

function removeItem(id){
  const list=safeList().filter(x=>x.id!==id);
  localStorage.setItem('MS_SAVED_ROWS',JSON.stringify(list));
  render();
}

function clearAll(){
  if(confirm('確定清除全部儲存內容？')){
    localStorage.removeItem('MS_SAVED_ROWS');
    render();
  }
}

function flattenForExcel(item){
  function val(name){return parseNum(getHigh(item.rows,name));}
  return {
    日期區間:item.dateRange||'',
    目前等級:item.level||'',
    目前百分比:item.levelPct||'',
    最終結果:item.final||'',
    總EXP:parseNum(item.totalExp),
    等值高階EXP:parseNum(item.totalHigh),
    狩獵:val('狩獵'),
    活動技能:val('活動技能'),
    暴風修練:val('暴風修練'),
    一般加速器:val('一般加速器'),
    快遞加速器:val('快遞加速器'),
    寶物獵人寶箱:val('寶物獵人寶箱'),
    每日三區:val('每日三區'),
    怪物公園:val('怪物公園'),
    紅月之森:val('紅月之森'),
    極限怪物公園:val('極限怪物公園'),
    史詩副本:val('史詩副本'),
    鋼鐵草莓農場:val('鋼鐵草莓農場'),
    黃金番茄拳擊機:val('黃金番茄拳擊機'),
    桑拿:val('桑拿'),
    高階票:val('高階票'),
    各種水:val('各種水'),
    會場掛機:val('會場掛機'),
    VIP掛機:val('VIP掛機'),
    備註:item.note||''
  };
}

function exportExcel(){
  const list=safeList();
  if(!list.length){alert('沒有可匯出的資料');return;}
  if(typeof XLSX==='undefined'){
    alert('XLSX 套件尚未載入，請改用 CSV 匯出。');
    return;
  }
  const summary=list.map(flattenForExcel);
  const detail=[];
  list.forEach((item,idx)=>{
    (item.rows||[]).forEach(r=>{
      detail.push({序號:idx+1,日期區間:item.dateRange||'',來源:r.source,EXP:r.exp,等值高階EXP:r.high});
    });
  });
  const inputs=[];
  list.forEach((item,idx)=>{
    Object.entries(item.inputs||{}).forEach(([key,value])=>{
      inputs.push({序號:idx+1,日期區間:item.dateRange||'',欄位:key,值:value});
    });
  });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(summary),'總覽');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(detail),'來源明細');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(inputs),'輸入快照');
  XLSX.writeFile(wb,'MS資料.xlsx');
}

function csvEscape(v){
  v=v==null?'':String(v);
  return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;
}

function exportCsv(){
  const list=safeList();
  if(!list.length){alert('沒有可匯出的資料');return;}
  const data=list.map(flattenForExcel);
  const headers=Object.keys(data[0]);
  const csv='\uFEFF'+headers.join(',')+'\n'+data.map(row=>headers.map(h=>csvEscape(row[h])).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='MS資料.csv';
  a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
