<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MS 主計算頁</title>
<style>


:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--line:#243041;--accent:#38bdf8}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0b1220,#0f172a);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans TC",sans-serif}
.wrap{max-width:1680px;margin:0 auto;padding:24px}
h1{margin:0 0 8px;font-size:28px}h2{font-size:18px;margin:0 0 12px}h3{font-size:13px;margin:10px 0 6px;color:#94a3b8}
.sub{color:var(--muted);line-height:1.6;margin-bottom:18px}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.nav a{color:#bae6fd;text-decoration:none;background:#082f49;padding:8px 12px;border-radius:999px;border:1px solid #164e63}
.grid{display:grid;grid-template-columns:1.35fr 1.15fr;gap:16px;align-items:start}
.stack{display:grid;gap:14px}.card{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 10px 35px rgba(0,0,0,.22)}
label{display:block;font-size:13px;color:#cbd5e1;margin-bottom:6px}input,select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:var(--text)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.muted{color:var(--muted);font-size:12px;line-height:1.5}.section-gap{margin-top:12px;padding-top:12px;border-top:1px dashed #334155}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.kpi{background:#0b1220;border:1px solid #243041;border-radius:10px;padding:8px 10px}.kpi .t{font-size:11px;color:#94a3b8;margin-bottom:4px}.kpi .v{font-size:18px;font-weight:700}
table{width:100%;border-collapse:collapse}th,td{text-align:right;padding:8px 6px;border-bottom:1px solid #243041;font-size:13px}th:first-child,td:first-child{text-align:left}
.note{background:#111827;border-left:4px solid var(--accent);padding:10px 12px;border-radius:10px;color:#cbd5e1;line-height:1.6}
.small{font-size:12px}
@media(max-width:1200px){.grid{grid-template-columns:1fr}}@media(max-width:760px){.row,.row3,.row4,.kpis{grid-template-columns:1fr}}


</style>
</head>
<body>
<div class="wrap">
  <div class="nav"><a href="./index.html">主計算頁</a><a href="./MS_狩獵經驗％計算.html">狩獵經驗%</a><a href="./MS_狩獵效率.html">狩獵效率</a><a href="./MS_活動資源等值高階EXP.html">活動資源</a><a href="./MS_VIP掛機推估.html">VIP掛機</a></div>
  <h1>MS 主計算頁</h1>
  <div class="sub"></div>

  <div class="grid">
    <div class="stack">
      <div class="card">
        <h2>基本設定</h2>
        <div class="row">
          <div><label>目前等級</label><select id="level"></select></div>
          <div><label>目前經驗 %</label><input id="levelPct" type="number" min="0" max="99.999999" step="0.0001" value="0"></div>
        </div>
        <div class="row section-gap">
          <div><label>升等選擇</label><select id="mode"><option value="normal">正常</option><option value="1plus1">1+1 到 LV270</option></select></div>
          <div><label>高階EXP使用（自填）</label><input id="manualHighExp" type="number" min="0" step="0.01" value="0"></div>
        </div>
      </div>

      <div class="card">
        <h2>狩獵設定</h2>
        <div class="row3">
          <div><label>基礎倍率 %</label><input id="baseRate" type="number" min="0" step="0.01" value="600"></div>
          <div><label>地圖輪額外加成 %</label><input id="wheelExtra" type="number" min="0" step="0.01" value="0"></div>
          <div><label>狩獵怪物總數</label><input id="huntingCount" type="number" min="0" step="1" value="0"></div>
        </div>
        <div class="note small" style="margin-top:10px">預設狩獵同等級怪物</div>
      </div>

      <div class="card">
        <h2>每日 / 每週項目</h2>
        <div class="row3">
          <div><label>總共幾週</label><input id="totalWeeks" type="number" min="0" step="1" value="0"></div>
          <div><label>怪物公園每週次數</label><input id="parkRunsPerWeek" type="number" min="0" step="1" value="0"><div class="muted">週日有額外加成50%，上限7次</div></div>
          <div><label>怪公 / 極怪公額外倍率 %</label><input id="extParkBonus" type="number" min="0" step="0.01" value="0"></div>
        </div>
        <div class="row3 section-gap">
          <div><label>每日經驗額外倍率（260以下） %</label><input id="dailyBonusUnder260" type="number" min="0" step="0.01" value="0"></div>
          <div><label>每日經驗額外倍率（260以上） %</label><input id="dailyBonus260Plus" type="number" min="0" step="0.01" value="0"></div>
          <div></div>
        </div>
        <div class="row3 section-gap">
          <div><label>每日 200–235區（每週0–7次）</label><input id="d200runsPerWeek" type="number" min="0" max="7" step="1" value="0"></div>
          <div><label>每日 245–255區（每週0–7次）</label><input id="d245runsPerWeek" type="number" min="0" max="7" step="1" value="0"></div>
          <div><label>每日 260區+（每週0–7次）</label><input id="d260runsPerWeek" type="number" min="0" max="7" step="1" value="0"></div>
        </div>
        <div class="row3 section-gap">
          <div><label>紅月之森 N週</label><input id="redMoonWeeks" type="number" min="0" step="1" value="0"></div>
          <div><label>紅月倍率</label><select id="redMoonMode"><option value="0">0倍</option><option value="1">1倍</option><option value="2">2倍</option></select></div>
          <div><label>極限怪物公園 N週</label><input id="extParkWeeks" type="number" min="0" step="1" value="0"></div>
        </div>
        <div class="row section-gap">
          <div class="muted" id="parkInfo"></div>
          <div></div>
        </div>
        <div class="row3 section-gap">
          <div><label>史詩副本260</label><input id="ep260" type="number" min="0" step="1" value="0"></div>
          <div><label>史詩副本270</label><input id="ep270" type="number" min="0" step="1" value="0"></div>
          <div><label>史詩副本280</label><input id="ep280" type="number" min="0" step="1" value="0"></div>
        </div>
        <div class="row section-gap">
          <div><label>史詩倍率</label><select id="epRate"><option value="1">1X</option><option value="10.75">10.75X</option><option value="custom">自選</option></select></div>
          <div><label>自選倍率</label><input id="epCustom" type="number" min="0" step="0.01" value="1"></div>
        </div>
      </div>

      <div class="card">
        <h2>活動區</h2>
        <div class="row3">
          <div><label>一般加速器數量</label><input id="normalBoosterCount" type="number" min="0" step="1" value="0"></div>
          <div><label>EXPRESS加速器數量</label><input id="expressCount" type="number" min="0" step="1" value="0"></div>
          <div><label>鋼鐵草莓農場次數</label><input id="steelCount" type="number" min="0" step="1" value="0"></div>
        </div>
        <div class="row3 section-gap">
          <div><label>黃金番茄次數</label><input id="tomatoRuns" type="number" min="0" step="1" value="0"></div>
          <div><label>黃金番茄分數</label><input id="tomatoAvg" type="number" min="0" max="1150" step="1" value="0"></div>
          <div><label>桑拿時數</label><input id="saunaHours" type="number" min="0" step="0.5" value="0"></div>
        </div>
        <div class="row section-gap">
          <div class="muted" id="activityInfo"></div>
          <div></div>
        </div>
      </div>

      <div class="card">
        <h2>水系統</h2>
        <div class="row4">
          <div><label>249水</label><input id="w249" type="number" min="0" step="1" value="0"></div>
          <div><label>259水</label><input id="w259" type="number" min="0" step="1" value="0"></div>
          <div><label>269水</label><input id="w269" type="number" min="0" step="1" value="0"></div>
          <div><label>274水</label><input id="w274" type="number" min="0" step="1" value="0"></div>
        </div>
      </div>
    </div>

    <div class="stack">
      <div class="card">
        <h2>計算結果</h2>
        <h3>進度</h3>
        <div class="kpis">
          <div class="kpi"><div class="t">起始狀態</div><div class="v" id="kpiStart">-</div></div>
          <div class="kpi"><div class="t">最終結果</div><div class="v" id="kpiFinal">-</div></div>
          <div class="kpi"><div class="t">尚差至下一等</div><div class="v" id="kpiNeed">0</div></div>
          <div class="kpi"><div class="t">狀態</div><div class="v" id="kpiStatus">可計算</div></div>
        </div>
        <h3>產出總覽</h3>
        <div class="kpis">
          <div class="kpi"><div class="t">本次總 EXP</div><div class="v" id="kpiExp">0</div></div>
          <div class="kpi"><div class="t">等值高階EXP</div><div class="v" id="kpiHigh">0</div></div>
          <div class="kpi"><div class="t">狩獵倍率</div><div class="v" id="kpiHuntRate">0%</div></div>
          <div class="kpi"><div class="t">怪公 / 極怪公加成</div><div class="v" id="kpiParkRate">0%</div></div>
        </div>
      </div>

      <div class="card"><h2>來源拆解</h2><table id="breakdown"><thead><tr><th>來源</th><th>EXP</th><th>等值高階EXP</th></tr></thead><tbody></tbody></table></div>

      <div class="card"><h2>顯示中的基礎資料</h2><table><tbody>
        <tr><th>怪物經驗</th><td id="baseMonster"></td></tr>
        <tr><th>1高階EXP經驗</th><td id="baseHigh"></td></tr>
        <tr><th>升等需求</th><td id="baseReq"></td></tr>
        <tr><th>一般加速器單罐</th><td id="baseBooster"></td></tr>
        <tr><th>EXPRESS 單次</th><td id="baseExpress"></td></tr>
        <tr><th>鋼鐵草莓單場</th><td id="baseSteel"></td></tr>
        <tr><th>黃金番茄每800分</th><td id="baseTomato"></td></tr>
      </tbody></table></div>
    </div>
  </div>
</div>

function fmt(n,d=0){if(!isFinite(n)) return '-';return Number(n).toLocaleString('zh-TW',{maximumFractionDigits:d,minimumFractionDigits:d})}
function num(v){const n=Number(v);return isFinite(n)?n:0}
function q(id){return document.getElementById(id)}
function addRow(rows,name,exp,highBase,customHigh=null){

    if(exp<=0) return;

    rows.push({
        name,
        exp,
        high:
            customHigh !== null
            ? customHigh
            : (highBase>0 ? exp/highBase : 0)
    });
}
function zoneBucket(level){return Math.min(290,260+Math.floor((Math.min(level,294)-260)/5)*5)}

function progressAfter(level,pct,extraExp,mode){if(level>=295) return {level:295,pct:0,need:0,status:'LV295 已達成'};let curLevel=level;let pool=GENERAL[curLevel].levelReq*pct/100+extraExp;while(curLevel<=294){const req=GENERAL[curLevel].levelReq;if(pool<req) break;pool-=req;if(mode==='1plus1'&&curLevel<270){curLevel=Math.min(curLevel+2,270);}else{curLevel+=1;}if(curLevel>=295) return {level:295,pct:0,need:0,status:'LV295 已達成'};}const nextReq=GENERAL[curLevel].levelReq;return {level:curLevel,pct:(pool/nextReq)*100,need:Math.max(0,nextReq-pool),status:'可計算'};}
function applyWater(state, cap, mode){

    const grantLevel =
        Math.min(state.level, cap);

    const waterExp =
        GENERAL[grantLevel].levelReq;

    const highEquivalent =
        waterExp /
        GENERAL[state.level].highExp;

    return {
        state: progressAfter(
            state.level,
            state.pct,
            waterExp,
            mode
        ),
        exp: waterExp,
        highEquivalent
    };
}

function simulateWaters(state, mode){

    const waters = [];

    for(let i=0;i<num(q('w249').value);i++) waters.push(249);
    for(let i=0;i<num(q('w259').value);i++) waters.push(259);
    for(let i=0;i<num(q('w269').value);i++) waters.push(269);
    for(let i=0;i<num(q('w274').value);i++) waters.push(274);

    waters.sort((a,b)=>a-b);

  let waterExpTotal = 0;
  let waterHighTotal = 0;

    for(const cap of waters){

        const result =
            applyWater(
                state,
                cap,
                mode
            );

        state = result.state;
        waterExpTotal += result.exp;
waterHighTotal += result.highEquivalent;
    }

   state.waterExpTotal = waterExpTotal;
state.waterHighTotal = waterHighTotal;

    return state;
}

}
